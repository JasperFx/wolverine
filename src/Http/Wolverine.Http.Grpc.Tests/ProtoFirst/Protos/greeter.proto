syntax = "proto3";

option csharp_namespace = "Wolverine.Http.Grpc.Tests.ProtoFirst";

package greet;

// Proto-first service exercising Wolverine's GrpcServiceChain code generation.
// Covers unary and server-streaming shapes.
service Greeter {
    rpc SayHello (HelloRequest) returns (HelloReply);
    rpc SayGoodbye (GoodbyeRequest) returns (GoodbyeReply);
    rpc StreamGreetings (StreamGreetingsRequest) returns (stream HelloReply);
    rpc Fault (FaultRequest) returns (FaultReply);
}

message HelloRequest {
    string name = 1;
}

message HelloReply {
    string message = 1;
}

message GoodbyeRequest {
    string name = 1;
}

message GoodbyeReply {
    string message = 1;
}

message StreamGreetingsRequest {
    string name = 1;
    int32 count = 2;
}

// Requests a Wolverine handler to throw a specific exception kind so the
// gRPC exception interceptor + mapper path can be exercised end-to-end.
message FaultRequest {
    string kind = 1;
}

message FaultReply {
    string message = 1;
}
