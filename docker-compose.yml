networks:
  app-tier:
    driver: bridge
  sb-emulator:
  sb-emulator-2:

services:
  mosquitto:
    image: "eclipse-mosquitto:2"
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  postgresql:
    image: "postgres:17"
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DATABASE=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  gcp-pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    ports:
      - "8085:8085"
    command:
      [
        "gcloud",
        "--quiet",
        "beta",
        "emulators",
        "pubsub",
        "start",
        "--host-port",
        "0.0.0.0:8085",
        "--project",
        "wolverine",
        "--verbosity",
        "debug",
        "--log-http",
        "--user-output-enabled",
      ]

  rabbitmq:
    image: "rabbitmq:4-management"
    ports:
      - "5672:5672"
      - "15672:15672"

  # SQL Server 2025 is required by Polecat 2.0+ (UseNativeJsonType defaults to true,
  # which uses the native `json` column type introduced in SQL Server 2025).
  #
  # If you're working locally on ARM and don't need Polecat tests, you can
  # override this service to use `mcr.microsoft.com/azure-sql-edge:latest` via
  # a docker-compose.override.yml — but Polecat integration tests will fail
  # against Azure SQL Edge unless you also set `m.UseNativeJsonType = false`
  # in the test fixture.
  #
  # Pinned to 2022-latest (May 2026): mcr.microsoft.com/mssql/server:2025-latest
  # ships with Windows build-server paths embedded in the master.mdf template
  # (F:\dbs\sh\5uj5\…\model.mdf), causing first-boot to crash with
  # "FCB::Open failed" / "Database 'model' cannot be opened" — error 5120/945.
  # 2022-latest has a clean Linux build, runs reliably under Rosetta on Apple
  # Silicon, and Wolverine doesn't depend on any 2025-only T-SQL surface.
  sqlserver:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    ports:
      - "1434:1433"
    environment:
      - "ACCEPT_EULA=Y"
      - "SA_PASSWORD=P@55w0rd"
      - "MSSQL_SA_PASSWORD=P@55w0rd"
      - "MSSQL_PID=Developer"

  pulsar:
    image: "apachepulsar/pulsar:4.0.3"
    ports:
      - "6650:6650"
      - "8080:8080"
    command: bin/pulsar standalone

  localstack:
    image: localstack/localstack:4
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
    environment:
      - DEBUG=${DEBUG-}
      - PERSISTENCE=${PERSISTENCE-}
      - LAMBDA_EXECUTOR=${LAMBDA_EXECUTOR-}
      - LOCALSTACK_API_KEY=${LOCALSTACK_API_KEY-}  # only required for Pro
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

  kafka:
    image: confluentinc/confluent-local:7.7.1
    ports:
      - "8082:8082"
      - "9092:9092"
      - "9101:9101"

  redis-server:
    image: "redis:7-alpine"
    command: redis-server
    ports:
      - "6379:6379"

  nats:
    image: "nats:2"
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "-m", "8222"]

  mysql:
    image: "mysql:8.0"
    ports:
      - "3306:3306"
    environment:
      - "MYSQL_ROOT_PASSWORD=P@55w0rd"
      - "MYSQL_DATABASE=wolverine"

  oracle:
    image: "gvenzl/oracle-free:23-slim"
    ports:
      - "1521:1521"
    environment:
      - "ORACLE_PASSWORD=P@55w0rd"
      - "APP_USER=wolverine"
      - "APP_USER_PASSWORD=wolverine"
    volumes:
      - ./docker/oracle:/container-entrypoint-initdb.d

  asb-sql:
    image: "mcr.microsoft.com/azure-sql-edge:latest"
    environment:
      - "ACCEPT_EULA=Y"
      - "MSSQL_SA_PASSWORD=Strong_Passw0rd#2025"
    networks:
      sb-emulator:

  asb-emulator:
    image: "mcr.microsoft.com/azure-messaging/servicebus-emulator:latest"
    volumes:
      - ./docker/asb/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - "5673:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: asb-sql
      MSSQL_SA_PASSWORD: "Strong_Passw0rd#2025"
      ACCEPT_EULA: "Y"
      EMULATOR_HTTP_PORT: 5300
    depends_on:
      - asb-sql
    networks:
      sb-emulator:

  cosmosdb:
    image: "mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview"
    ports:
      - "8081:8081"
      - "1234:1234"
    environment:
      - "PROTOCOL=https"

  asb-sql-2:
    image: "mcr.microsoft.com/azure-sql-edge:latest"
    environment:
      - "ACCEPT_EULA=Y"
      - "MSSQL_SA_PASSWORD=Strong_Passw0rd#2025"
    networks:
      sb-emulator-2:

  asb-emulator-2:
    image: "mcr.microsoft.com/azure-messaging/servicebus-emulator:latest"
    volumes:
      - ./docker/asb/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - "5674:5672"
      - "5301:5300"
    environment:
      SQL_SERVER: asb-sql-2
      MSSQL_SA_PASSWORD: "Strong_Passw0rd#2025"
      ACCEPT_EULA: "Y"
      EMULATOR_HTTP_PORT: 5300
    depends_on:
      - asb-sql-2
    networks:
      sb-emulator-2:
