name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  config: Release
  disable_test_parallelization: true

jobs:
  test:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    # CIPolecat is the heaviest persistence suite (234 serial SqlServer integration tests incl. DCB +
    # distribution + sagas). It passes in ~10 min in the good case but can exceed 20 when a couple of
    # flaky saga/storage tests retry on a slow runner (the tests themselves pass — no hang; ~7.5 min
    # locally). Give it more wall-clock so the retry logic can finish instead of being cut off. See #3350.
    timeout-minutes: ${{ matrix.target == 'CIPolecat' && 30 || 20 }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - CIAWS
          - CIAzureServiceBus
          - CICosmosDb
          - CIEfCore
          - CIGrpc
          - CIKafka
          - CIMarten
          - CIMQTT
          - CIMySql
          - CINATS
          - CIOracle
          - CIPersistence
          - CIPolecat
          - CIPubsub
          - CIPulsar
          - CIRabbitMQ
          - CIRavenDb
          - CIRedis
          - CISqlite
          - CISqlServer
          - CICircuitBreaking
          - CIAotSmoke

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run Tests
        run: ./build.sh ${{ matrix.target }} --framework net9.0

      - name: Stop containers
        if: always()
        run: docker compose down
