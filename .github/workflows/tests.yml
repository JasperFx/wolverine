name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  config: Release
  disable_test_parallelization: true

jobs:
  test:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - CIAWS
          - CIAzureServiceBus
          - CICosmosDb
          - CIEfCore
          - CIGrpc
          - CIKafka
          - CIMarten
          - CIMQTT
          - CIMySql
          - CINATS
          - CIOracle
          - CIPersistence
          - CIPolecat
          - CIPulsar
          - CIRabbitMQ
          - CIRavenDb
          - CIRedis
          - CISqlite
          - CISqlServer
          - CICircuitBreaking

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run Tests
        run: ./build.sh ${{ matrix.target }} --framework net9.0

      - name: Stop containers
        if: always()
        run: docker compose down
