name: fsharp

# F# code-generation audit gate (issue GH-2969). Proves that Wolverine's static codegen path emits
# F# that actually compiles: the compile-gate test regenerates the fixture's Generated.fs from real
# Wolverine frames and shells `dotnet build` against the checked-in F# fixture (with a one-time FS0193
# retry for the transient F# internal-compiler crash). Also surfaces the `wolverine-diagnostics
# fsharp-coverage` tally (implemented / skipped / remaining frames) in the test output.
#
# Path-filtered so it is only triggered by changes that can affect F# emit. Make this job required for
# merge via branch protection on PRs touching those paths; it simply isn't triggered elsewhere.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'src/Wolverine/**'
      - 'src/Http/**'
      - 'src/Persistence/**'
      - '**/*Frame.cs'
      - 'wolverine_fsharp.slnx'
      - 'src/Testing/Wolverine.Core.FSharp*/**'
      - 'src/Testing/Wolverine.Http.FSharp*/**'
      - 'src/Testing/Wolverine.EfCore.FSharp*/**'
      - 'src/Testing/Wolverine.Marten.FSharp*/**'
      - 'src/Testing/Wolverine.MartenAggregate.FSharp*/**'
      - 'src/Testing/Wolverine.Cosmos.FSharp*/**'
      - 'src/Testing/Wolverine.Behavioural.FSharp*/**'
      - 'src/Samples/WolverineFSharpSample/**'
      - 'src/Samples/WolverineMartenFSharpSample/**'
      - 'src/Samples/WolverineMartenAggregateFSharpSample/**'
      - 'src/Samples/WolverineCosmosFSharpSample/**'
      - 'src/Extensions/Wolverine.FluentValidation/**'
      - '.github/workflows/fsharp.yml'
  workflow_dispatch:

env:
  config: Release

jobs:
  fsharp-codegen-compile-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build the F# solution
        run: dotnet build wolverine_fsharp.slnx -c "$config" --nologo

      # Run the two surface gates SEQUENTIALLY (not `dotnet test wolverine_fsharp.slnx`, which runs the
      # test assemblies in parallel). Each gate shells a nested `dotnet build` of its F# fixture, and
      # both fixtures transitively build Debug Wolverine.dll — concurrent nested builds race on
      # obj/Debug/.../refint/Wolverine.dll (IOException "used by another process"). Serializing avoids it.
      - name: Compile-gate + fsharp-coverage (Core surface)
        run: dotnet test src/Testing/Wolverine.Core.FSharpTests/Wolverine.Core.FSharpTests.csproj -c "$config" --nologo

      - name: Compile-gate + fsharp-coverage (Http surface)
        run: dotnet test src/Testing/Wolverine.Http.FSharpTests/Wolverine.Http.FSharpTests.csproj -c "$config" --nologo

      - name: Compile-gate (EF Core surface)
        run: dotnet test src/Testing/Wolverine.EfCore.FSharpTests/Wolverine.EfCore.FSharpTests.csproj -c "$config" --nologo

      - name: Compile-gate (Marten document surface)
        run: dotnet test src/Testing/Wolverine.Marten.FSharpTests/Wolverine.Marten.FSharpTests.csproj -c "$config" --nologo

      - name: Compile-gate (Marten aggregate surface)
        run: dotnet test src/Testing/Wolverine.MartenAggregate.FSharpTests/Wolverine.MartenAggregate.FSharpTests.csproj -c "$config" --nologo

      - name: Compile-gate (FluentValidation + CosmosDB surface)
        run: dotnet test src/Testing/Wolverine.Cosmos.FSharpTests/Wolverine.Cosmos.FSharpTests.csproj -c "$config" --nologo

      # Run-verified: boots a host in TypeLoadMode.Static against the pre-generated F# adapter and
      # asserts the handler actually executes (not just compiles). Also exercises the
      # `dotnet run -- codegen write --language fsharp` CLI end to end against the F# app, asserting it
      # exits 0 (every chain — including Wolverine's internal HandlerRegistry — emits F#) and that the
      # generated adapter matches the committed, run-verified Generated.fs.
      - name: Behavioural run-step + codegen write --language fsharp (TypeLoadMode.Static)
        run: dotnet test src/Testing/Wolverine.Behavioural.FSharpTests/Wolverine.Behavioural.FSharpTests.csproj -c "$config" --nologo
